services:
  app-server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: production
    container_name: loar-server
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - loar-network

  app-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    container_name: loar-web
    ports:
      - "3001:3001"
    restart: unless-stopped
    networks:
      - loar-network

  indexer:
    build:
      context: .
      dockerfile: apps/indexer/Dockerfile
    container_name: loar-indexer
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
    ports:
      - "42069:42069"
    restart: unless-stopped
    networks:
      - loar-network

  minio:
    image: minio/minio
    container_name: loar-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - loar-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  minio_data:

networks:
  loar-network:
    name: loar-network
    driver: bridge
