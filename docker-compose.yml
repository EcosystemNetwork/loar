services:
  redis:
    image: redis:7-alpine
    container_name: loar-redis
    command:
      - redis-server
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
      - --appendonly
      - 'yes'
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loar-network

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: production
    container_name: loar-server
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - '3000:3000'
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    networks:
      - loar-network

  indexer:
    build:
      context: .
      dockerfile: apps/indexer/Dockerfile
    container_name: loar-indexer
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
    ports:
      - '42069:42069'
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:42069/health']
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - loar-network

networks:
  loar-network:
    name: loar-network
    driver: bridge

volumes:
  redis-data:
    name: loar-redis-data
