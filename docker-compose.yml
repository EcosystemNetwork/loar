services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: production
    container_name: loar-server
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
    ports:
      - '3000:3000'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    networks:
      - loar-network

  indexer:
    build:
      context: .
      dockerfile: apps/indexer/Dockerfile
    container_name: loar-indexer
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
    ports:
      - '42069:42069'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:42069/health']
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - loar-network

networks:
  loar-network:
    name: loar-network
    driver: bridge
