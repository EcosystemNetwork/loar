name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for legacy domains
        run: |
          if grep -rn "loartech\.xyz\|loar-one\.vercel\.app" \
            --include="*.ts" --include="*.tsx" \
            --include="*.json" --include="*.yaml" --include="*.yml" \
            --include="*.html" --include="*.env*" \
            --exclude-dir=".git" --exclude-dir="node_modules" \
            --exclude-dir="dist" --exclude-dir=".next" \
            .; then
            echo ""
            echo "ERROR: Legacy domain reference found. Update to loar.fun."
            exit 1
          fi
          echo "No legacy domain references found."

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check-types

      - name: Verify docs/pricing.md matches registries
        # docs/pricing.md is generated from apps/server/src/services/*-models/
        # registries. If a registry changes, the doc must be regenerated and
        # committed. This step regenerates and fails if anything drifted.
        run: |
          pnpm docs:pricing
          if ! git diff --exit-code -- docs/pricing.md; then
            echo ""
            echo "::error::docs/pricing.md is out of date."
            echo "A model registry under apps/server/src/services/*-models/registry.ts"
            echo "was changed without regenerating the pricing doc."
            echo ""
            echo "Run:    pnpm docs:pricing"
            echo "Commit: git add docs/pricing.md && git commit"
            exit 1
          fi
          echo "docs/pricing.md is in sync."

  build:
    name: Build
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  web:
    name: Web App
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (server — needed for AppRouter types)
        run: pnpm --filter server check-types

      - name: Type check (web)
        run: pnpm --filter web check-types

      - name: Build web
        run: pnpm --filter web build

      - name: 'Verify no node: imports in bundle'
        run: |
          if grep -rP 'require\("node:|from "node:|from '\''node:' apps/web/dist/assets/*.js 2>/dev/null; then
            echo "ERROR: node: module imports found in browser bundle"
            exit 1
          fi
          echo "No node: module imports in bundle"

  server-tests:
    name: Server Tests
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 3 server tests (likeness-marketplace, likeness-access, persona) hit a
      # real Firestore via `./_real-firebase.ts`, which throws when the
      # emulator at 127.0.0.1:8080 isn't reachable. Start it in the background
      # before vitest runs.
      - name: Set up Java for Firestore emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Start Firestore emulator
        run: |
          npm i -g firebase-tools@13
          firebase emulators:start --only firestore --project loar-db &
          # Poll until the emulator HTTP root is reachable (max 60s).
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/ >/dev/null 2>&1; then
              echo "Firestore emulator is up"
              exit 0
            fi
            sleep 1
          done
          echo "Firestore emulator failed to start within 60s"
          exit 1

      - name: Run server tests
        run: pnpm --filter server run test -- --reporter=verbose --reporter=junit --outputFile=test-results/junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-results-${{ github.run_id }}
          path: apps/server/test-results/junit.xml
          retention-days: 14

  address-registry:
    name: Address Registry
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify addresses.ts matches deployment manifests
        run: pnpm check:addresses

  indexer-validate:
    name: Indexer Validation
    needs: [quality]
    runs-on: ubuntu-latest
    # Indexer is its own deployable Ponder service — type errors here should
    # not block backend API deploys. Mark non-blocking until indexer is fixed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check indexer schema and config
        run: pnpm --filter indexer typecheck
        continue-on-error: true

      - name: Run indexer handler tests
        run: pnpm --filter indexer test
        continue-on-error: true

  contracts:
    name: Smart Contracts
    needs: [quality]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Forge fmt
        run: forge fmt --check

      - name: Install Soldeer dependencies
        run: |
          forge soldeer install
          # OpenZeppelin's Soldeer package extracts flat (no /contracts/ subdir),
          # but remappings.txt and historical local installs expect a nested
          # contracts/ path. Self-loop symlink lets both forms resolve.
          ln -sfn . dependencies/@openzeppelin-contracts-5.0.2/contracts
          ln -sfn . dependencies/@openzeppelin-contracts-upgradeable-5.0.2/contracts

      # Default profile + Solc 0.8.30 trips an internal "Tag too large" IR
      # optimizer bug on this codebase — see CLAUDE.md and apps/contracts/
      # foundry.toml. The `test` profile disables the optimizer so it builds
      # cleanly, but the resulting bytecode is larger than EIP-170 for some
      # contracts (expected — test profile is not a deploy target). So we
      # build without `--sizes` here; size enforcement happens at deploy time
      # under the default profile.
      - name: Forge build
        run: forge build
        env:
          FOUNDRY_PROFILE: test

      - name: Forge test
        run: forge test -vvv 2>&1 | tee forge-test-output.txt
        env:
          FOUNDRY_PROFILE: test

      - name: Upload forge test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forge-test-results-${{ github.run_id }}
          path: apps/contracts/forge-test-output.txt
          retention-days: 14

  # Hermetic model-matrix smoke — exercises every registry, dispatcher import,
  # and adapter wiring. No external network, no provider keys, no Firestore.
  # Catches registry-id drift, missing CostProvider entries, broken dispatcher
  # branches, and BYOK provider gaps without burning a single API call.
  model-matrix-smoke:
    name: Model Matrix Smoke
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run model-matrix smoke
        run: pnpm smoke:matrix

  # Single required status check — require this in branch protection settings.
  # It only passes when every parallel job above passes.
  ci-gate:
    name: CI Gate
    needs:
      [build, web, server-tests, address-registry, indexer-validate, contracts, model-matrix-smoke]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: $results"
          if echo "$results" | grep -q '"failure"\|"cancelled"'; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All required jobs passed."
