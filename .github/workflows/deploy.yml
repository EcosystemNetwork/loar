name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: Linux-docker-${{github.sha}}
          restore-keys: |
            Linux-docker

      - name: Deploy via SSH
        env:
          SSH_HOST: ${{secrets.SSH_HOST}}
          SSH_USER: ${{secrets.SSH_USER}}
          WORK_DIR: ${{secrets.WORK_DIR}}
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

          ssh-keyscan -H $SSH_HOST >> known_hosts 2>/dev/null

          ssh -i private_key.pem -o StrictHostKeyChecking=yes -o UserKnownHostsFile=known_hosts -tt $SSH_USER@$SSH_HOST << 'ENDSSH'
            set -e
            cd ${{ secrets.WORK_DIR }}

            # ── 1. Record rollback point before touching anything ──────────────
            PREV_SHA=$(git rev-parse HEAD 2>/dev/null || echo "none")
            DEPLOY_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            echo "Previous SHA : $PREV_SHA"

            # ── 2. Pull latest code ────────────────────────────────────────────
            git pull origin main
            CURRENT_SHA=$(git rev-parse HEAD)
            echo "Current SHA  : $CURRENT_SHA"

            # Persist deploy state — rollback.sh reads PREV_SHA from here
            printf 'PREV_SHA=%s\nCURRENT_SHA=%s\nDEPLOY_TIME=%s\n' \
              "$PREV_SHA" "$CURRENT_SHA" "$DEPLOY_TIME" > .loar-deploy

            chmod +x scripts/smoke-test.sh scripts/rollback.sh

            # ── 3. Build & start containers ────────────────────────────────────
            docker compose build
            docker compose up -d
            docker compose ps

            # ── 4. Wait for HTTP health endpoints (max 90s) ────────────────────
            echo ""
            echo "Waiting for services to become ready..."
            READY=0
            for i in $(seq 1 18); do
              SRV=$(curl -sf --max-time 5 http://localhost:3000/health  >/dev/null 2>&1 && echo ok || echo no)
              IDX=$(curl -sf --max-time 5 http://localhost:42069/health >/dev/null 2>&1 && echo ok || echo no)
              if [ "$SRV" = "ok" ] && [ "$IDX" = "ok" ]; then
                READY=1
                echo "  Services responding after $((i * 5))s"
                break
              fi
              echo "  [$i/18] server=$SRV indexer=$IDX — retrying in 5s..."
              sleep 5
            done

            if [ "$READY" -eq 0 ]; then
              echo ""
              echo "ERROR: Services did not respond within 90s — triggering rollback"
              ROLLBACK_SHA="$PREV_SHA" ./scripts/rollback.sh || true
              printf 'DEPLOY_STATUS=failed_timeout\n' >> .loar-deploy
              exit 1
            fi

            # ── 5. Smoke tests ─────────────────────────────────────────────────
            echo ""
            if ! ./scripts/smoke-test.sh; then
              echo "Smoke tests FAILED — triggering rollback to $PREV_SHA"
              ROLLBACK_SHA="$PREV_SHA" ./scripts/rollback.sh || true
              printf 'DEPLOY_STATUS=failed_smoke\n' >> .loar-deploy
              exit 1
            fi

            printf 'DEPLOY_STATUS=ok\n' >> .loar-deploy

            # ── 6. Deploy summary ──────────────────────────────────────────────
            echo ""
            echo "========================================"
            echo "  Deploy Summary"
            echo "========================================"
            echo "  Commit  : $CURRENT_SHA"
            echo "  App     : https://loartech.xyz"
            echo "  API     : https://api.loartech.xyz"
            echo "  Indexer : https://idx.loartech.xyz"
            echo "  Smoke   : PASSED"
            echo "  Time    : $DEPLOY_TIME"
            echo "========================================"
          ENDSSH

          rm -f private_key.pem known_hosts
