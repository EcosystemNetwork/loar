name: Deploy Backend

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy if CI passed — skip on failure or cancellation
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit (blocks deploy on high-severity findings)
        run: pnpm audit --audit-level=high

      - name: Set up Docker Buildx
        # Pinned to commit SHA — high-trust action on the deploy path. A
        # compromised floating tag would let an attacker swap in arbitrary
        # buildx code with access to the deploy environment.
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Cache Docker layers
        # Bump to v4 (was @v3 — drift from the rest of the repo) and pin SHA.
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /tmp/.buildx-cache
          key: Linux-docker-${{github.sha}}
          restore-keys: |
            Linux-docker

      - name: Setup SSH
        # CRITICAL pinning: this action receives the production SSH key. A
        # compromised v0.9.0 tag would equal full production access.
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy via SSH
        env:
          SSH_HOST: ${{secrets.SSH_HOST}}
          SSH_USER: ${{secrets.SSH_USER}}
          WORK_DIR: ${{secrets.WORK_DIR}}
        # INF-8: delegate all deploy logic to the checked-in script so every
        # line that touches production is visible in code review. The only
        # thing the workflow does itself is: set known_hosts, cd into the
        # deploy checkout, and run the repo's versioned deploy script.
        run: |
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" \
            "cd \"$WORK_DIR\" && git pull origin main && chmod +x scripts/deploy-server.sh && ./scripts/deploy-server.sh"
