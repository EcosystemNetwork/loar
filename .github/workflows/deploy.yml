name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: Linux-docker-${{github.sha}}
          restore-keys: |
            Linux-docker

      - name: Deploy via SSH
        env:
          SSH_HOST: ${{secrets.SSH_HOST}}
          SSH_USER: ${{secrets.SSH_USER}}
          WORK_DIR: ${{secrets.WORK_DIR}}
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

          ssh-keyscan -H $SSH_HOST >> known_hosts 2>/dev/null

          ssh -i private_key.pem -o StrictHostKeyChecking=yes -o UserKnownHostsFile=known_hosts -tt $SSH_USER@$SSH_HOST << 'EOF'
            set -e
            cd ${{ secrets.WORK_DIR }}
            git pull origin main
            docker compose build
            docker compose up -d
            docker compose ps
            echo "Deploy complete"
          EOF

          rm -f private_key.pem known_hosts
