name: Pricing staleness

# Weekly walk of every model registry. Any registry untouched for more than
# the staleness threshold (default 90 days) gets surfaced via an open
# GitHub issue. When all registries are fresh again the issue auto-closes.
#
# Why weekly and not daily: provider list prices change on a quarterly /
# monthly cadence. Polling every day is noise. Weekly is the smallest
# cadence that still catches a missed pricing change inside one billing
# cycle.
#
# Disabled by default — flip to enabled in the GitHub Actions UI once
# you're ready for the issue to be opened. The job runs read-only until
# then.

on:
  schedule:
    # Every Monday at 14:00 UTC (07:00 PT / 16:00 CET) — pre-standup slot.
    - cron: '0 14 * * 1'
  workflow_dispatch:
    inputs:
      days:
        description: 'Staleness threshold in days'
        required: false
        default: '90'

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  audit:
    name: Audit registry freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so `git log` finds each file's real last commit.
          # Shallow clone returns "0d ago" for every file → false-negatives.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run staleness check
        id: staleness
        run: |
          DAYS="${{ github.event.inputs.days || '90' }}"
          # Capture JSON for the issue body; print text version to job log.
          pnpm registry:check-staleness --days="$DAYS" || true
          pnpm registry:check-staleness --days="$DAYS" --json > staleness.json || true
          # Parse the JSON for the gate decision.
          STALE_COUNT=$(jq -r '.staleCount' staleness.json)
          echo "stale_count=$STALE_COUNT" >> "$GITHUB_OUTPUT"
          echo "Stale registries: $STALE_COUNT"

      - name: Build issue body
        if: steps.staleness.outputs.stale_count != '0'
        run: |
          {
            echo "Weekly registry staleness audit found **$(jq -r '.staleCount' staleness.json)** registr$([ "$(jq -r '.staleCount' staleness.json)" = "1" ] && echo 'y' || echo 'ies') untouched for more than $(jq -r '.thresholdDays' staleness.json) days."
            echo
            echo "Verify provider pricing for each and bump the corresponding registry file (committing the file is what marks it fresh — no number change required if pricing didn't move)."
            echo
            echo "### Stale registries"
            echo
            jq -r '.stale[] | "**" + .name + "** — last touched " + (.lastCommitIso // "(unknown)") + " (" + ((.ageDays|tostring) // "?") + " days ago)\n\nProvider dashboards to verify:\n" + ([.providerHints[] | "- " + .] | join("\n")) + "\n\nFile: `" + .relPath + "`\n\n---"' staleness.json
            echo
            echo "After verifying, regenerate the pricing doc:"
            echo
            echo '```'
            echo 'pnpm docs:pricing'
            echo '```'
            echo
            echo "_Auto-generated by [.github/workflows/pricing-staleness.yml](../blob/main/.github/workflows/pricing-staleness.yml). This issue will auto-close once every registry is fresh again._"
          } > issue-body.md
          cat issue-body.md

      - name: Open or update stale-pricing issue
        if: steps.staleness.outputs.stale_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find existing open issue with the same title.
          EXISTING=$(gh issue list --state open --search 'in:title "Pricing registry staleness"' --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Updating existing issue #$EXISTING"
            gh issue edit "$EXISTING" --body-file issue-body.md
          else
            echo "Opening new staleness issue"
            gh issue create \
              --title "Pricing registry staleness — verify provider list prices" \
              --label "pricing,ops" \
              --body-file issue-body.md
          fi

      - name: Close stale-pricing issue if fresh again
        if: steps.staleness.outputs.stale_count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --state open --search 'in:title "Pricing registry staleness"' --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "All registries fresh — closing issue #$EXISTING"
            gh issue close "$EXISTING" --comment "All registries fresh as of $(date -u +%Y-%m-%d). Closing automatically."
          else
            echo "All registries fresh — no open issue to close."
          fi

      - name: Upload audit JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staleness-audit-${{ github.run_id }}
          path: staleness.json
          retention-days: 30
