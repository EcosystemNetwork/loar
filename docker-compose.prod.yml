##
## Production Docker Compose — Horizontal Scaling
##
## Usage (plain docker compose — NOT swarm):
##   docker compose -f docker-compose.prod.yml up -d \
##     --scale server=${SERVER_REPLICAS:-4} \
##     --scale worker=${WORKER_REPLICAS:-2}
##
## Or with env vars set in .env (recommended):
##   SERVER_REPLICAS=4 WORKER_REPLICAS=2 WORKER_CONCURRENCY=5 \
##     docker compose -f docker-compose.prod.yml up -d \
##     --scale server=${SERVER_REPLICAS} --scale worker=${WORKER_REPLICAS}
##
## This gives you:
##   - nginx load balancer (port 80) distributing across N server replicas
##   - Redis for shared state (rate limiting, job queue, circuit breakers)
##   - Separate worker fleet for generation jobs (doesn't block API)
##   - Health checks on all services
##
## NOTE on `deploy.replicas`: under plain `docker compose` (not swarm) the
## `deploy.replicas` key is IGNORED. The value here is a documentation hint
## + a target for swarm/k8s deployments. Ops MUST pass `--scale server=N`
## on the CLI (or via the wrapper script) to actually run N replicas.
##
## Sizing guidance: see docs/scale-readiness-10k.md § Horizontal scaling.
##

services:
  # ── Load Balancer ─────��─────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: loar-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/ssl/certs:ro
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - loar-network
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Redis (shared state) ─────────────��──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: loar-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save "" --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set - generate with openssl rand -hex 32}
    restart: unless-stopped
    networks:
      - loar-network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis-data:/data

  # ── API Server (scalable) ───────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: production
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379
      - TRUST_PROXY=true
      - WORKER_CONCURRENCY=0
    expose:
      - '3000'
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 15s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - loar-network
    deploy:
      # NOTE: ignored under plain `docker compose` — pass `--scale server=N`
      # on the CLI. See the scaling note at the top of this file.
      replicas: 4
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'

  # ── Generation Workers (separate from API) ──────────────────────────
  worker:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: production
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379
      # WORKER_CONCURRENCY is the number of jobs ONE worker container runs in
      # parallel. Total concurrent generation = WORKER_REPLICAS × WORKER_CONCURRENCY.
      # Rule of thumb: each job pegs 1 CPU during encode/poll, so keep the
      # product below the host's CPU count for headroom.
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-5}
    # Override CMD to run the worker process instead of the server
    command: ['node', 'apps/server/dist/workers/generation.worker.js']
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - loar-network
    deploy:
      # NOTE: ignored under plain `docker compose` — pass `--scale worker=N`
      # on the CLI. See the scaling note at the top of this file.
      replicas: 2
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'

  # ── Ponder Indexer ──────────────────────────────────────────────────
  indexer:
    build:
      context: .
      dockerfile: apps/indexer/Dockerfile
    container_name: loar-indexer
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
    ports:
      - '42069:42069'
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:42069/health']
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - loar-network

volumes:
  redis-data:

networks:
  loar-network:
    name: loar-network
    driver: bridge
