##
## Production Docker Compose — Horizontal Scaling
##
## Usage:
##   docker compose -f docker-compose.prod.yml up -d --scale server=4 --scale worker=2
##
## This gives you:
##   - nginx load balancer (port 80) distributing across N server replicas
##   - Redis for shared state (rate limiting, job queue, circuit breakers)
##   - Separate worker fleet for generation jobs (doesn't block API)
##   - Health checks on all services
##

services:
  # ── Load Balancer ─────��─────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: loar-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/ssl/certs:ro
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - loar-network
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Redis (shared state) ─────────────��──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: loar-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save "" --requirepass ${REDIS_PASSWORD:-changeme}
    restart: unless-stopped
    networks:
      - loar-network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-changeme}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis-data:/data

  # ── API Server (scalable) ───────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: production
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      - TRUST_PROXY=true
      - WORKER_CONCURRENCY=0
    expose:
      - '3000'
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 15s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - loar-network
    deploy:
      replicas: 4
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'

  # ── Generation Workers (separate from API) ──────────────────────────
  worker:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: production
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      - WORKER_CONCURRENCY=5
    # Override CMD to run the worker process instead of the server
    command: ['node', 'apps/server/dist/workers/generation.worker.js']
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - loar-network
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'

  # ── Ponder Indexer ──────────────────────────────────────────────────
  indexer:
    build:
      context: .
      dockerfile: apps/indexer/Dockerfile
    container_name: loar-indexer
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
    ports:
      - '42069:42069'
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:42069/health']
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - loar-network

volumes:
  redis-data:

networks:
  loar-network:
    name: loar-network
    driver: bridge
