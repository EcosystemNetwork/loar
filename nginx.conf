upstream loar_api {
    # Round-robin across server replicas
    # Docker Compose service scaling: docker compose up --scale server=4
    server server:3000;

    # Keep connections alive to reduce TCP handshake overhead
    keepalive 64;
}

upstream loar_worker {
    server worker:3001;
    keepalive 16;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_global:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=ai_gen:5m rate=5r/s;
limit_req_zone $binary_remote_addr zone=upload:5m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=sse_conn:10m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS server ───────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    # TLS certificates (mount or provision via certbot/ACME at deploy time)
    ssl_certificate     /etc/ssl/certs/loar.crt;
    ssl_certificate_key /etc/ssl/certs/loar.key;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Client body size for file uploads
    client_max_body_size 200m;

    # Global rate limit: 50 req/s per IP with burst of 100
    limit_req zone=api_global burst=100 nodelay;

    # Health check (bypass rate limiting)
    location = /health {
        limit_req off;
        proxy_pass http://loar_api;
        proxy_set_header Host $host;
    }

    # SSE endpoints — long-lived connections
    location ~ ^/api/(collaboration|jobs)/ {
        # Limit concurrent SSE connections per IP
        limit_conn sse_conn 20;

        proxy_pass http://loar_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-specific: disable buffering, long timeouts
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;  # 10 min for generation SSE
        proxy_send_timeout 600s;
        chunked_transfer_encoding off;

        # Required for SSE
        proxy_set_header Connection '';
        proxy_http_version 1.1;
    }

    # AI generation endpoints — stricter rate limit
    location ~ ^/trpc/(generation|image|voice|threed|audio)\. {
        limit_req zone=ai_gen burst=10 nodelay;

        proxy_pass http://loar_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Video generation can take minutes
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # File upload — rate limited
    location = /api/upload {
        limit_req zone=upload burst=5 nodelay;

        proxy_pass http://loar_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
    }

    # Stripe webhook — bypass rate limiting
    location /api/stripe {
        limit_req off;
        proxy_pass http://loar_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # All other API/tRPC requests
    location / {
        proxy_pass http://loar_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection '';

        # Standard API timeout
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
