upstream loar_api {
    # Round-robin across server replicas
    # Docker Compose service scaling: docker compose up --scale server=4
    server server:3000;

    # Keep connections alive to reduce TCP handshake overhead
    keepalive 64;
}

upstream loar_worker {
    server worker:3001;
    keepalive 16;
}

# ── Rate-limit zones ─────────────────────────────────────────────────
# Defense-in-depth: nginx rate-limits run BEFORE the server-side middleware
# (apps/server/src/middleware/rate-limit.ts) so a flood is stopped at the
# edge without consuming a Node worker slot. Numbers below are the edge
# ceilings — per-route application limits in the server are usually tighter.
limit_req_zone $binary_remote_addr zone=api_global:10m   rate=50r/s;
limit_req_zone $binary_remote_addr zone=ai_expensive:5m  rate=1r/s;   # video / orchestrator / pipeline / episode / cutdown / 3d
limit_req_zone $binary_remote_addr zone=ai_cheap:5m      rate=5r/s;   # image / voice / audio / editing / lipsync / sceneAudio
limit_req_zone $binary_remote_addr zone=auth:5m          rate=3r/s;   # /auth/* — SIWE login storms
limit_req_zone $binary_remote_addr zone=upload:5m        rate=2r/s;
limit_req_zone $binary_remote_addr zone=dmca:5m          rate=1r/m;   # /api/takedown + /api/counter-notice — statutory, not spam path

# Connection caps — prevents a single IP exhausting worker slots.
limit_conn_zone $binary_remote_addr zone=sse_conn:10m;
limit_conn_zone $binary_remote_addr zone=perip_conn:10m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS server ───────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    # TLS certificates (mount or provision via certbot/ACME at deploy time)
    ssl_certificate     /etc/ssl/certs/loar.crt;
    ssl_certificate_key /etc/ssl/certs/loar.key;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Client body size for file uploads
    client_max_body_size 200m;

    # Global rate limit: 50 req/s per IP with burst of 100.
    limit_req zone=api_global burst=100 nodelay;

    # Cap concurrent connections per IP at 50. Real browsers open 6–12;
    # anything above 50 is a bot or an accidental leak. SSE paths have
    # their own cap (sse_conn=20) so this doesn't starve live updates.
    limit_conn perip_conn 50;

    # Health check (bypass rate limiting) — used by docker healthcheck,
    # load balancer, and the /status page's client-side poll.
    location = /health {
        limit_req off;
        limit_conn off;
        proxy_pass http://loar_api;
        proxy_set_header Host $host;
    }

    # Prometheus scrape endpoint — bypass rate limits. METRICS_AUTH_TOKEN
    # on the server enforces access control. If you run the scraper on
    # shared infra, put a matcher here instead (allow 10.0.0.0/8; deny all;).
    location = /metrics {
        limit_req off;
        limit_conn off;
        proxy_pass http://loar_api;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # SSE endpoints — long-lived connections
    location ~ ^/api/(collaboration|jobs)/ {
        # Limit concurrent SSE connections per IP
        limit_conn sse_conn 20;

        proxy_pass http://loar_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-specific: disable buffering, long timeouts
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;  # 10 min for generation SSE
        proxy_send_timeout 600s;
        chunked_transfer_encoding off;

        # Required for SSE
        proxy_set_header Connection '';
        proxy_http_version 1.1;
    }

    # AI generation — expensive paths (video, pipeline, orchestrator, 3d,
    # cutdown, episode batch). Strict edge cap: 1r/s + burst 3. Server-side
    # per-wallet limits (2–5/min) provide the real ceiling; this is the
    # "flood from one IP" backstop.
    location ~ ^/trpc/(generation|studio|characterPipeline|episodes|cutdown|threed)\. {
        limit_req zone=ai_expensive burst=3 nodelay;

        proxy_pass http://loar_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Video / 3D generation can take minutes; let the request keep going.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # AI generation — cheap paths (image, voice, audio, editing, lipsync,
    # sceneAudio). Higher edge ceiling; fast endpoints tolerate more burst.
    location ~ ^/trpc/(image|voice|audio|editing|lipsync|sceneAudio)\. {
        limit_req zone=ai_cheap burst=15 nodelay;

        proxy_pass http://loar_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # SIWE auth — nonce/verify/refresh. 3r/s per IP is generous for real
    # users (one login = 2 requests) and snug for credential-stuffing bots.
    location ~ ^/auth/ {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass http://loar_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 15s;
    }

    # DMCA intake + counter-notice — legally important, NOT a spam surface.
    # 1r/min per IP is deliberately aggressive: real claimants file once;
    # mass-notice bots fly past this.
    location ~ ^/api/(takedown|counter-notice) {
        limit_req zone=dmca burst=2 nodelay;

        proxy_pass http://loar_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 30s;
    }

    # File upload — rate limited
    location = /api/upload {
        limit_req zone=upload burst=5 nodelay;

        proxy_pass http://loar_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
    }

    # Stripe webhook — bypass rate limiting
    location /api/stripe {
        limit_req off;
        proxy_pass http://loar_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # All other API/tRPC requests
    location / {
        proxy_pass http://loar_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection '';

        # Standard API timeout
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
